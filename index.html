<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Приглашение</title>
    <style>
        /* ——— Подключение шрифта ——— */
        @font-face {
            font-family: 'Patriciana';
            src: url('ofont.ru_Patriciana.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ——— Сброс и базовые стили ——— */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Patriciana', serif;
        }

        /* ——— Контейнер для двух экранов ——— */
        .screen-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
        }

        /* ——— Общий класс для экранов ——— */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease;
            will-change: opacity;
        }

        /* ——— ПЕРВЫЙ ЭКРАН (главная.png + кнопка) ——— */
        #firstScreen {
            background: #ffffff;
            z-index: 3;
            opacity: 1;
            pointer-events: auto;
        }

        /* ——— ВТОРОЙ ЭКРАН (первая.png + прокрутка + текст) ——— */
        #secondScreen {
            background: #ffffff;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0;
            display: block;
        }

        #secondScreen::-webkit-scrollbar {
            width: 4px;
        }

        #secondScreen::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        #secondScreen::-webkit-scrollbar-thumb {
            background: rgba(128, 0, 32, 0.3);
            border-radius: 10px;
        }

        /* ——— ФОТО НА ВТОРОМ ЭКРАНЕ (весь экран) ——— */
        .second-bg {
            position: relative;
            width: 100%;
            height: 100vh;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 1;
        }

        .second-bg .main-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
            z-index: 1;
        }

        /* ——— Контент поверх фото ——— */
        .content-overlay {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 1rem;
            text-align: center;
            color: #4a1a1a;
            pointer-events: none;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .content-overlay.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ——— Имена (МАКСИМАЛЬНО БОЛЬШОЙ ШРИФТ) ——— */
        .names {
            font-size: clamp(5rem, 14vw, 14rem);
            line-height: 1.05;
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
            max-width: 95vw;
        }

        .names .vladislav {
            font-size: clamp(4.5rem, 12vw, 12rem);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 700;
        }

        .names .and-ksenia {
            font-size: clamp(5.5rem, 15vw, 15rem);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: nowrap;
            font-weight: 700;
        }

        .names .and-ksenia .and {
            font-size: clamp(1.4rem, 3vw, 3.2rem);
            text-transform: lowercase;
            letter-spacing: 0.2em;
            opacity: 0.6;
            font-weight: 400;
        }

        /* ——— Дата (смещена ниже) ——— */
        .date-section {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            padding-left: 3%;
        }

        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 88%;
            max-width: 950px;
            gap: 0.8rem;
            flex-wrap: nowrap;
            margin-left: -2%;
        }

        .bottom-row .left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }

        .bottom-row .left .line {
            width: 50px;
            height: 2px;
            background-color: #4a1a1a;
            opacity: 0.4;
            flex-shrink: 0;
        }

        .bottom-row .left .text {
            font-size: clamp(2rem, 4vw, 4.2rem);
            letter-spacing: 0.08em;
            white-space: nowrap;
            color: #4a1a1a;
            text-transform: uppercase;
            font-weight: 700;
        }

        .bottom-row .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            line-height: 1;
            padding: 0 0.5rem;
        }

        .bottom-row .center .month {
            font-size: clamp(1.8rem, 3.2vw, 3.2rem);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.7;
            color: #4a1a1a;
            margin-bottom: 0.05rem;
            font-weight: 600;
        }

        .bottom-row .center .day-number {
            font-size: clamp(6rem, 12vw, 13rem);
            font-weight: 900;
            color: #4a1a1a;
            line-height: 1;
        }

        .bottom-row .center .year {
            font-size: clamp(1.5rem, 2.6vw, 2.6rem);
            letter-spacing: 0.08em;
            opacity: 0.5;
            color: #4a1a1a;
            margin-top: 0.05rem;
            font-weight: 600;
        }

        .bottom-row .right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }

        .bottom-row .right .line {
            width: 50px;
            height: 2px;
            background-color: #4a1a1a;
            opacity: 0.4;
            flex-shrink: 0;
        }

        .bottom-row .right .text {
            font-size: clamp(2rem, 4vw, 4.2rem);
            letter-spacing: 0.08em;
            white-space: nowrap;
            color: #4a1a1a;
            font-weight: 700;
        }

        /* ——— БЛОК С ТЕКСТОМ ПОСЛЕ ФОТО (БОРДОВЫЙ ФОН, БЕЛЫЙ ТЕКСТ) ——— */
        .text-section {
            width: 100%;
            min-height: 70vh;
            flex-shrink: 0;
            background: #4a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 3rem 2rem 0 2rem;
            text-align: center;
            z-index: 2;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
            position: relative;
        }

        .text-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ——— Анимация для каждого элемента ——— */
        .text-section .greeting {
            font-size: clamp(2.8rem, 5vw, 6rem);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #ffffff;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;
            font-weight: 700;
            font-style: italic;
        }

        .text-section.visible .greeting {
            opacity: 0.95;
            transform: translateY(0);
        }

        .text-section .message {
            font-size: clamp(1.6rem, 3vw, 3.6rem);
            line-height: 1.5;
            letter-spacing: 0.04em;
            color: #ffffff;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s;
            max-width: 90%;
            font-weight: 400;
        }

        .text-section.visible .message {
            opacity: 0.85;
            transform: translateY(0);
        }

        .text-section .message-bold {
            font-size: clamp(1.6rem, 3vw, 3.6rem);
            line-height: 1.5;
            letter-spacing: 0.04em;
            color: #ffffff;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease 0.6s, transform 0.8s ease 0.6s;
            max-width: 90%;
            font-weight: 400;
            margin-bottom: 1.5rem;
        }

        .text-section.visible .message-bold {
            opacity: 0.85;
            transform: translateY(0);
        }

        .text-section .calendar-img {
            width: 100%;
            margin-top: auto;
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            border-radius: 0;
            padding: 0;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease 0.8s, transform 0.8s ease 0.8s;
        }

        .text-section.visible .calendar-img {
            opacity: 1;
            transform: translateY(0);
        }

        .text-section .calendar-img img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            margin: 0;
            padding: 0;
        }

        /* ——— Фото на первом экране ——— */
        .main-bg-first {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
            z-index: 1;
        }

        /* ——— ПРОЗРАЧНАЯ КНОПКА (без обводок) ——— */
        .circle-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            pointer-events: auto;
            z-index: 10;
        }

        .circle-btn:hover,
        .circle-btn:active,
        .circle-btn:focus {
            background: transparent;
            border: none;
            outline: none;
            box-shadow: none;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ——— СЛОЙ С ТОЧКАМИ НА БЕЛОМ ФОНЕ ——— */
        #dotsLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            background: #ffffff;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        #dotsLayer.active {
            opacity: 1;
        }

        /* ——— Мерцающие точки (быстрое мерцание) ——— */
        .dot {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #800020;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 5px #80002066;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .dot.active {
            opacity: 1;
            animation: twinkleFast 1s infinite alternate ease-in-out;
            will-change: opacity, transform;
        }

        @keyframes twinkleFast {
            0% {
                opacity: 0.05;
                transform: scale(0.6);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.4);
            }
            100% {
                opacity: 0.05;
                transform: scale(0.6);
            }
        }

        /* Тонкие точечки, хаотично */
        .dot:nth-child(1) { top: 5%; left: 3%; animation-delay: 0.00s; }
        .dot:nth-child(2) { top: 8%; left: 15%; animation-delay: 0.08s; }
        .dot:nth-child(3) { top: 3%; left: 28%; animation-delay: 0.16s; }
        .dot:nth-child(4) { top: 12%; left: 42%; animation-delay: 0.04s; }
        .dot:nth-child(5) { top: 6%; left: 55%; animation-delay: 0.20s; }
        .dot:nth-child(6) { top: 15%; left: 68%; animation-delay: 0.06s; }
        .dot:nth-child(7) { top: 4%; left: 80%; animation-delay: 0.14s; }
        .dot:nth-child(8) { top: 10%; left: 92%; animation-delay: 0.10s; }
        
        .dot:nth-child(9) { top: 22%; left: 7%; animation-delay: 0.12s; }
        .dot:nth-child(10) { top: 28%; left: 20%; animation-delay: 0.24s; }
        .dot:nth-child(11) { top: 18%; left: 35%; animation-delay: 0.06s; }
        .dot:nth-child(12) { top: 30%; left: 48%; animation-delay: 0.18s; }
        .dot:nth-child(13) { top: 20%; left: 60%; animation-delay: 0.02s; }
        .dot:nth-child(14) { top: 25%; left: 75%; animation-delay: 0.22s; }
        .dot:nth-child(15) { top: 32%; left: 88%; animation-delay: 0.11s; }
        
        .dot:nth-child(16) { top: 40%; left: 2%; animation-delay: 0.09s; }
        .dot:nth-child(17) { top: 45%; left: 12%; animation-delay: 0.19s; }
        .dot:nth-child(18) { top: 38%; left: 25%; animation-delay: 0.05s; }
        .dot:nth-child(19) { top: 48%; left: 38%; animation-delay: 0.15s; }
        .dot:nth-child(20) { top: 42%; left: 52%; animation-delay: 0.01s; }
        .dot:nth-child(21) { top: 50%; left: 65%; animation-delay: 0.13s; }
        .dot:nth-child(22) { top: 44%; left: 78%; animation-delay: 0.07s; }
        .dot:nth-child(23) { top: 52%; left: 90%; animation-delay: 0.21s; }
        
        .dot:nth-child(24) { top: 60%; left: 5%; animation-delay: 0.10s; }
        .dot:nth-child(25) { top: 65%; left: 18%; animation-delay: 0.17s; }
        .dot:nth-child(26) { top: 58%; left: 32%; animation-delay: 0.03s; }
        .dot:nth-child(27) { top: 68%; left: 45%; animation-delay: 0.13s; }
        .dot:nth-child(28) { top: 62%; left: 58%; animation-delay: 0.22s; }
        .dot:nth-child(29) { top: 70%; left: 72%; animation-delay: 0.01s; }
        .dot:nth-child(30) { top: 64%; left: 85%; animation-delay: 0.18s; }
        .dot:nth-child(31) { top: 72%; left: 95%; animation-delay: 0.06s; }
        
        .dot:nth-child(32) { top: 80%; left: 8%; animation-delay: 0.14s; }
        .dot:nth-child(33) { top: 85%; left: 22%; animation-delay: 0.05s; }
        .dot:nth-child(34) { top: 78%; left: 36%; animation-delay: 0.23s; }
        .dot:nth-child(35) { top: 88%; left: 50%; animation-delay: 0.09s; }
        .dot:nth-child(36) { top: 82%; left: 64%; animation-delay: 0.02s; }
        .dot:nth-child(37) { top: 90%; left: 78%; animation-delay: 0.16s; }
        .dot:nth-child(38) { top: 86%; left: 90%; animation-delay: 0.12s; }
        
        .dot:nth-child(39) { top: 95%; left: 15%; animation-delay: 0.06s; }
        .dot:nth-child(40) { top: 93%; left: 40%; animation-delay: 0.18s; }
        .dot:nth-child(41) { top: 97%; left: 60%; animation-delay: 0.10s; }
        .dot:nth-child(42) { top: 94%; left: 82%; animation-delay: 0.04s; }

        /* ——— Адаптив для телефонов ——— */
        @media (max-width: 600px) {
            .circle-btn {
                width: 140px;
                height: 140px;
            }
            .bottom-row {
                width: 92%;
                gap: 0.3rem;
                margin-left: -2%;
            }
            .bottom-row .left .line,
            .bottom-row .right .line {
                width: 15px;
                height: 1.5px;
            }
            .bottom-row .left .text,
            .bottom-row .right .text {
                font-size: clamp(1.2rem, 2.8vw, 1.6rem);
            }
            .bottom-row .center .day-number {
                font-size: clamp(4rem, 10vw, 6rem);
            }
            .bottom-row .center .month {
                font-size: clamp(1rem, 2.2vw, 1.4rem);
            }
            .bottom-row .center .year {
                font-size: clamp(0.9rem, 1.8vw, 1.2rem);
            }
            .names .vladislav {
                font-size: clamp(3rem, 8vw, 4.5rem);
            }
            .names .and-ksenia {
                font-size: clamp(3.5rem, 10vw, 5.5rem);
            }
            .names .and-ksenia .and {
                font-size: clamp(1rem, 2.5vw, 1.4rem);
            }
            .date-section {
                padding-left: 2%;
                margin-top: 1rem;
                margin-bottom: 0.3rem;
            }
            .text-section {
                min-height: 60vh;
                padding: 2rem 1.2rem 0 1.2rem;
            }
            .text-section .greeting {
                font-size: clamp(1.8rem, 4vw, 2.8rem);
                margin-bottom: 1rem;
            }
            .text-section .message {
                font-size: clamp(1.1rem, 2.2vw, 1.6rem);
            }
            .text-section .message-bold {
                font-size: clamp(1.1rem, 2.2vw, 1.6rem);
                margin-bottom: 1rem;
            }
        }

        @media (max-width: 400px) {
            .circle-btn {
                width: 100px;
                height: 100px;
            }
            .bottom-row .left .line,
            .bottom-row .right .line {
                width: 10px;
                height: 1px;
            }
            .bottom-row .left .text,
            .bottom-row .right .text {
                font-size: 0.9rem;
            }
            .bottom-row .center .day-number {
                font-size: 3.2rem;
            }
            .bottom-row .center .month {
                font-size: 0.8rem;
            }
            .bottom-row .center .year {
                font-size: 0.7rem;
            }
            .names .vladislav {
                font-size: 2.5rem;
            }
            .names .and-ksenia {
                font-size: 3rem;
            }
            .names .and-ksenia .and {
                font-size: 0.8rem;
            }
            .date-section {
                padding-left: 0;
                margin-top: 0.8rem;
                margin-bottom: 0.2rem;
            }
            .text-section {
                min-height: 55vh;
                padding: 1.5rem 0.8rem 0 0.8rem;
            }
            .text-section .greeting {
                font-size: 1.4rem;
                margin-bottom: 0.8rem;
            }
            .text-section .message {
                font-size: 0.9rem;
            }
            .text-section .message-bold {
                font-size: 0.9rem;
                margin-bottom: 0.8rem;
            }
        }

        /* Для очень больших экранов */
        @media (min-width: 1400px) {
            .names .vladislav {
                font-size: 12rem;
            }
            .names .and-ksenia {
                font-size: 15rem;
            }
            .bottom-row .center .day-number {
                font-size: 13rem;
            }
            .bottom-row .left .text,
            .bottom-row .right .text {
                font-size: 4.2rem;
            }
            .bottom-row .center .month {
                font-size: 3.2rem;
            }
            .bottom-row .center .year {
                font-size: 2.6rem;
            }
            .bottom-row .left .line,
            .bottom-row .right .line {
                width: 60px;
                height: 2px;
            }
            .text-section .greeting {
                font-size: 6rem;
            }
            .text-section .message {
                font-size: 3.6rem;
            }
            .text-section .message-bold {
                font-size: 3.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="screen-container">

        <!-- ====== ПЕРВЫЙ ЭКРАН (главная.png + кнопка) ====== -->
        <div id="firstScreen" class="screen">
            <img class="main-bg-first" src="главная.png" alt="фон" />
            <button class="circle-btn" id="fadeBtn" aria-label="Перейти"></button>
        </div>

        <!-- ====== СЛОЙ С ТОЧКАМИ НА БЕЛОМ ФОНЕ ====== -->
        <div id="dotsLayer">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <!-- ====== ВТОРОЙ ЭКРАН (с прокруткой) ====== -->
        <div id="secondScreen" class="screen">

            <!-- Фото на весь экран -->
            <div class="second-bg">
                <img class="main-bg" src="первая.png" alt="фон" />

                <div class="content-overlay" id="contentOverlay">
                    <!-- Имена -->
                    <div class="names">
                        <div class="vladislav">VLADISLAV</div>
                        <div class="and-ksenia">
                            <span class="and">and</span>
                            <span>KSENIA</span>
                        </div>
                    </div>

                    <!-- Дата (опущена ниже) -->
                    <div class="date-section">
                        <div class="bottom-row">
                            <div class="left">
                                <span class="line"></span>
                                <span class="text">ПЯТНИЦА</span>
                                <span class="line"></span>
                            </div>

                            <div class="center">
                                <span class="month">АВГУСТА</span>
                                <span class="day-number">28</span>
                                <span class="year">2026</span>
                            </div>

                            <div class="right">
                                <span class="line"></span>
                                <span class="text">16:00</span>
                                <span class="line"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Текст на бордовом фоне (белый текст) с анимацией -->
            <div class="text-section" id="textSection">
                <div class="greeting">Дорогие друзья и родные!</div>
                <div class="message">Случилось невероятное — мы решили связать наши судьбы и начать новую главу нашей жизни вместе.</div>
                <div class="message-bold">Будем очень рады, если вы разделите с нами этот теплый и важный день.</div>
                
                <!-- Фото календарь.png -->
                <div class="calendar-img">
                    <img src="календарь.PNG" alt="календарь" />
                </div>
            </div>

        </div>

    </div>

    <script>
        (function() {
            const firstScreen = document.getElementById('firstScreen');
            const secondScreen = document.getElementById('secondScreen');
            const dotsLayer = document.getElementById('dotsLayer');
            const contentOverlay = document.getElementById('contentOverlay');
            const textSection = document.getElementById('textSection');
            const fadeBtn = document.getElementById('fadeBtn');
            const dots = document.querySelectorAll('#dotsLayer .dot');

            let isTransitioning = false;
            let dotsActivated = false;

            function activateDots() {
                if (dotsActivated) return;
                dotsActivated = true;
                dots.forEach(dot => {
                    dot.classList.add('active');
                });
            }

            function deactivateDots() {
                dots.forEach(dot => {
                    dot.classList.remove('active');
                    dot.style.opacity = '0';
                });
                dotsLayer.classList.remove('active');
            }

            function switchToSecondScreen() {
                if (isTransitioning) return;
                isTransitioning = true;

                firstScreen.style.opacity = '0';
                firstScreen.style.pointerEvents = 'none';

                setTimeout(() => {
                    dotsLayer.classList.add('active');
                    activateDots();
                }, 1200);

                setTimeout(() => {
                    deactivateDots();

                    secondScreen.style.opacity = '1';
                    secondScreen.style.pointerEvents = 'auto';

                    setTimeout(() => {
                        contentOverlay.classList.add('visible');
                    }, 200);

                    setTimeout(() => {
                        textSection.classList.add('visible');
                    }, 500);

                    isTransitioning = false;
                }, 3200);
            }

            fadeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                switchToSecondScreen();
            });

            // Разрешаем прокрутку на втором экране
            secondScreen.addEventListener('touchstart', function(e) {
                // Ничего не блокируем
            }, { passive: true });

        })();
    </script>
</body>
</html>
