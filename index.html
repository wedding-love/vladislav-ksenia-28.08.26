<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Приглашение</title>
    <style>
        /* ——— Подключение шрифта ——— */
        @font-face {
            font-family: 'Patriciana';
            src: url('ofont.ru_Patriciana.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ——— Сброс и базовые стили ——— */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Patriciana', serif;
        }

        /* ——— Контейнер для двух экранов ——— */
        .screen-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
        }

        /* ——— Общий класс для экранов ——— */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease;
            will-change: opacity;
        }

        /* ——— ПЕРВЫЙ ЭКРАН (главная.png + кнопка) ——— */
        #firstScreen {
            background: #ffffff;
            z-index: 3;
            opacity: 1;
            pointer-events: auto;
        }

        /* ——— ВТОРОЙ ЭКРАН (первая.png + контент) ——— */
        #secondScreen {
            background: #ffffff;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
        }

        /* ——— Фото на экранах ——— */
        .main-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
            z-index: 1;
        }

        /* ——— Фото на втором экране (подстраивается под экран) ——— */
        #secondScreen .main-bg {
            object-fit: contain;
            background: #ffffff;
        }

        /* ——— Контент на втором экране (поверх первая.png) ——— */
        .content-wrapper {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 1rem;
            text-align: center;
            color: #4a1a1a;
            pointer-events: none;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .content-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ——— Имена (максимально большой шрифт) ——— */
        .names {
            font-size: clamp(3.5rem, 10vw, 9rem);
            line-height: 1.05;
            letter-spacing: 0.02em;
            margin-bottom: 2rem;
            max-width: 95vw;
        }

        .names .vladislav {
            font-size: clamp(3.2rem, 9vw, 8rem);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .names .and-ksenia {
            font-size: clamp(4rem, 11vw, 10rem);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: nowrap;
        }

        .names .and-ksenia .and {
            font-size: clamp(1rem, 2.2vw, 2.2rem);
            text-transform: lowercase;
            letter-spacing: 0.2em;
            opacity: 0.6;
        }

        /* ——— Нижняя строка (максимально большой шрифт) ——— */
        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 92%;
            max-width: 950px;
            gap: 0.6rem;
            flex-wrap: nowrap;
        }

        .bottom-row .left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .bottom-row .left .line {
            width: 35px;
            height: 1.5px;
            background-color: #4a1a1a;
            opacity: 0.4;
            flex-shrink: 0;
        }

        .bottom-row .left .text {
            font-size: clamp(1.4rem, 2.8vw, 2.6rem);
            letter-spacing: 0.08em;
            white-space: nowrap;
            color: #4a1a1a;
            text-transform: uppercase;
        }

        .bottom-row .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            line-height: 1;
            padding: 0 0.3rem;
        }

        .bottom-row .center .month {
            font-size: clamp(1.2rem, 2.2vw, 2rem);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.7;
            color: #4a1a1a;
            margin-bottom: 0.05rem;
        }

        .bottom-row .center .day-number {
            font-size: clamp(4rem, 8vw, 8rem);
            font-weight: bold;
            color: #4a1a1a;
            line-height: 1;
        }

        .bottom-row .center .year {
            font-size: clamp(1rem, 1.8vw, 1.6rem);
            letter-spacing: 0.08em;
            opacity: 0.5;
            color: #4a1a1a;
            margin-top: 0.05rem;
        }

        .bottom-row .right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .bottom-row .right .line {
            width: 35px;
            height: 1.5px;
            background-color: #4a1a1a;
            opacity: 0.4;
            flex-shrink: 0;
        }

        .bottom-row .right .text {
            font-size: clamp(1.4rem, 2.8vw, 2.6rem);
            letter-spacing: 0.08em;
            white-space: nowrap;
            color: #4a1a1a;
        }

        /* ——— ПРОЗРАЧНАЯ КНОПКА (без обводок) ——— */
        .circle-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            pointer-events: auto;
            z-index: 10;
        }

        .circle-btn:hover,
        .circle-btn:active,
        .circle-btn:focus {
            background: transparent;
            border: none;
            outline: none;
            box-shadow: none;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ——— СЛОЙ С ТОЧКАМИ НА БЕЛОМ ФОНЕ ——— */
        #dotsLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            background: #ffffff;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #dotsLayer.active {
            opacity: 1;
        }

        /* ——— Мерцающие точки (быстрое мерцание) ——— */
        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #800020;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 4px #80002066;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .dot.active {
            opacity: 1;
            animation: twinkleFast 1s infinite alternate ease-in-out;
            will-change: opacity, transform;
        }

        @keyframes twinkleFast {
            0% {
                opacity: 0.05;
                transform: scale(0.6);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.4);
            }
            100% {
                opacity: 0.05;
                transform: scale(0.6);
            }
        }

        /* Тонкие точечки, хаотично */
        .dot:nth-child(1) { top: 5%; left: 3%; animation-delay: 0.00s; }
        .dot:nth-child(2) { top: 8%; left: 15%; animation-delay: 0.08s; }
        .dot:nth-child(3) { top: 3%; left: 28%; animation-delay: 0.16s; }
        .dot:nth-child(4) { top: 12%; left: 42%; animation-delay: 0.04s; }
        .dot:nth-child(5) { top: 6%; left: 55%; animation-delay: 0.20s; }
        .dot:nth-child(6) { top: 15%; left: 68%; animation-delay: 0.06s; }
        .dot:nth-child(7) { top: 4%; left: 80%; animation-delay: 0.14s; }
        .dot:nth-child(8) { top: 10%; left: 92%; animation-delay: 0.10s; }
        
        .dot:nth-child(9) { top: 22%; left: 7%; animation-delay: 0.12s; }
        .dot:nth-child(10) { top: 28%; left: 20%; animation-delay: 0.24s; }
        .dot:nth-child(11) { top: 18%; left: 35%; animation-delay: 0.06s; }
        .dot:nth-child(12) { top: 30%; left: 48%; animation-delay: 0.18s; }
        .dot:nth-child(13) { top: 20%; left: 60%; animation-delay: 0.02s; }
        .dot:nth-child(14) { top: 25%; left: 75%; animation-delay: 0.22s; }
        .dot:nth-child(15) { top: 32%; left: 88%; animation-delay: 0.11s; }
        
        .dot:nth-child(16) { top: 40%; left: 2%; animation-delay: 0.09s; }
        .dot:nth-child(17) { top: 45%; left: 12%; animation-delay: 0.19s; }
        .dot:nth-child(18) { top: 38%; left: 25%; animation-delay: 0.05s; }
        .dot:nth-child(19) { top: 48%; left: 38%; animation-delay: 0.15s; }
        .dot:nth-child(20) { top: 42%; left: 52%; animation-delay: 0.01s; }
        .dot:nth-child(21) { top: 50%; left: 65%; animation-delay: 0.13s; }
        .dot:nth-child(22) { top: 44%; left: 78%; animation-delay: 0.07s; }
        .dot:nth-child(23) { top: 52%; left: 90%; animation-delay: 0.21s; }
        
        .dot:nth-child(24) { top: 60%; left: 5%; animation-delay: 0.10s; }
        .dot:nth-child(25) { top: 65%; left: 18%; animation-delay: 0.17s; }
        .dot:nth-child(26) { top: 58%; left: 32%; animation-delay: 0.03s; }
        .dot:nth-child(27) { top: 68%; left: 45%; animation-delay: 0.13s; }
        .dot:nth-child(28) { top: 62%; left: 58%; animation-delay: 0.22s; }
        .dot:nth-child(29) { top: 70%; left: 72%; animation-delay: 0.01s; }
        .dot:nth-child(30) { top: 64%; left: 85%; animation-delay: 0.18s; }
        .dot:nth-child(31) { top: 72%; left: 95%; animation-delay: 0.06s; }
        
        .dot:nth-child(32) { top: 80%; left: 8%; animation-delay: 0.14s; }
        .dot:nth-child(33) { top: 85%; left: 22%; animation-delay: 0.05s; }
        .dot:nth-child(34) { top: 78%; left: 36%; animation-delay: 0.23s; }
        .dot:nth-child(35) { top: 88%; left: 50%; animation-delay: 0.09s; }
        .dot:nth-child(36) { top: 82%; left: 64%; animation-delay: 0.02s; }
        .dot:nth-child(37) { top: 90%; left: 78%; animation-delay: 0.16s; }
        .dot:nth-child(38) { top: 86%; left: 90%; animation-delay: 0.12s; }
        
        .dot:nth-child(39) { top: 95%; left: 15%; animation-delay: 0.06s; }
        .dot:nth-child(40) { top: 93%; left: 40%; animation-delay: 0.18s; }
        .dot:nth-child(41) { top: 97%; left: 60%; animation-delay: 0.10s; }
        .dot:nth-child(42) { top: 94%; left: 82%; animation-delay: 0.04s; }

        /* ——— Адаптив ——— */
        @media (max-width: 600px) {
            .circle-btn {
                width: 120px;
                height: 120px;
            }
            .bottom-row {
                width: 96%;
                gap: 0.3rem;
            }
            .bottom-row .left .line,
            .bottom-row .right .line {
                width: 12px;
            }
            .bottom-row .left .text,
            .bottom-row .right .text {
                font-size: clamp(0.9rem, 2vw, 1.2rem);
            }
            .bottom-row .center .day-number {
                font-size: clamp(3rem, 7vw, 4.5rem);
            }
            .bottom-row .center .month {
                font-size: clamp(0.8rem, 1.8vw, 1rem);
            }
            .bottom-row .center .year {
                font-size: clamp(0.7rem, 1.4vw, 0.9rem);
            }
            .names .vladislav {
                font-size: clamp(2.5rem, 7vw, 4rem);
            }
            .names .and-ksenia {
                font-size: clamp(3rem, 8vw, 5rem);
            }
            .names .and-ksenia .and {
                font-size: clamp(0.8rem, 1.8vw, 1.2rem);
            }
        }

        @media (max-width: 400px) {
            .circle-btn {
                width: 90px;
                height: 90px;
            }
            .bottom-row .left .line,
            .bottom-row .right .line {
                width: 8px;
            }
            .bottom-row .left .text,
            .bottom-row .right .text {
                font-size: 0.7rem;
            }
            .bottom-row .center .day-number {
                font-size: 2.5rem;
            }
            .bottom-row .center .month {
                font-size: 0.6rem;
            }
            .bottom-row .center .year {
                font-size: 0.55rem;
            }
            .names .vladislav {
                font-size: 2rem;
            }
            .names .and-ksenia {
                font-size: 2.5rem;
            }
            .names .and-ksenia .and {
                font-size: 0.7rem;
            }
        }

        /* Для очень больших экранов */
        @media (min-width: 1400px) {
            .names .vladislav {
                font-size: 8rem;
            }
            .names .and-ksenia {
                font-size: 10rem;
            }
            .bottom-row .center .day-number {
                font-size: 8rem;
            }
            .bottom-row .left .text,
            .bottom-row .right .text {
                font-size: 2.8rem;
            }
            .bottom-row .center .month {
                font-size: 2.2rem;
            }
            .bottom-row .center .year {
                font-size: 1.8rem;
            }
            .bottom-row .left .line,
            .bottom-row .right .line {
                width: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="screen-container">

        <!-- ====== ПЕРВЫЙ ЭКРАН (главная.png + кнопка) ====== -->
        <div id="firstScreen" class="screen">
            <img class="main-bg" src="главная.png" alt="фон" />
            <button class="circle-btn" id="fadeBtn" aria-label="Перейти"></button>
        </div>

        <!-- ====== СЛОЙ С ТОЧКАМИ НА БЕЛОМ ФОНЕ ====== -->
        <div id="dotsLayer">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <!-- ====== ВТОРОЙ ЭКРАН (первая.png + имена + дата) ====== -->
        <div id="secondScreen" class="screen">
            <img class="main-bg" src="первая.png" alt="фон" />

            <div class="content-wrapper" id="contentWrapper">
                <div class="names">
                    <div class="vladislav">VLADISLAV</div>
                    <div class="and-ksenia">
                        <span class="and">and</span>
                        <span>KSENIA</span>
                    </div>
                </div>

                <div class="bottom-row">
                    <div class="left">
                        <span class="line"></span>
                        <span class="text">ПЯТНИЦА</span>
                        <span class="line"></span>
                    </div>

                    <div class="center">
                        <span class="month">АВГУСТА</span>
                        <span class="day-number">28</span>
                        <span class="year">2026</span>
                    </div>

                    <div class="right">
                        <span class="line"></span>
                        <span class="text">16:00</span>
                        <span class="line"></span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        (function() {
            const firstScreen = document.getElementById('firstScreen');
            const secondScreen = document.getElementById('secondScreen');
            const dotsLayer = document.getElementById('dotsLayer');
            const contentWrapper = document.getElementById('contentWrapper');
            const fadeBtn = document.getElementById('fadeBtn');
            const dots = document.querySelectorAll('#dotsLayer .dot');

            let isTransitioning = false;
            let dotsActivated = false;

            function activateDots() {
                if (dotsActivated) return;
                dotsActivated = true;
                dots.forEach(dot => {
                    dot.classList.add('active');
                });
            }

            function deactivateDots() {
                dots.forEach(dot => {
                    dot.classList.remove('active');
                    dot.style.opacity = '0';
                });
                dotsLayer.classList.remove('active');
            }

            function switchToSecondScreen() {
                if (isTransitioning) return;
                isTransitioning = true;

                // 1. Плавное затухание первого экрана
                firstScreen.style.opacity = '0';
                firstScreen.style.pointerEvents = 'none';

                // 2. Сразу показываем слой с белым фоном и точками
                dotsLayer.classList.add('active');
                activateDots();

                // 3. Через 2 секунды открываем второй экран
                setTimeout(() => {
                    // Убираем точки
                    deactivateDots();

                    // Показываем второй экран
                    secondScreen.style.opacity = '1';
                    secondScreen.style.pointerEvents = 'auto';

                    // Плавное появление контента
                    setTimeout(() => {
                        contentWrapper.classList.add('visible');
                    }, 200);

                    isTransitioning = false;
                }, 2000);
            }

            // Клик по кнопке на первом экране
            fadeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                switchToSecondScreen();
            });
        })();
    </script>
</body>
</html>
